version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: beer-cellar-db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-beercellar}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-beer_cellar_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-beercellar}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beer-cellar-network

  redis:
    image: redis:7-alpine
    container_name: beer-cellar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beer-cellar-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beer-cellar-backend
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - beer-cellar-network

volumes:
  postgres_data:
  redis_data:

networks:
  beer-cellar-network:
    driver: bridge
