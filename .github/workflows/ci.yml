name: CI/CD Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: beer_cellar_db
          POSTGRES_USER: beer_user
          POSTGRES_PASSWORD: beer123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      - name: Lint Backend
        run: |
          cd backend
          npm run lint || true

      - name: Test Backend
        run: |
          cd backend
          npm run test:run || true
        env:
          DATABASE_URL: postgresql://beer_user:beer123@localhost:5432/beer_cellar_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint Frontend
        run: |
          cd frontend
          npm run lint || true

      - name: Build Frontend
        run: |
          cd frontend
          npm run build || true

      - name: Install Mobile Dependencies
        run: |
          cd mobile
          npm ci

      - name: Lint Mobile
        run: |
          cd mobile
          npm run lint || true

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Build Backend
        run: |
          cd backend
          npm ci
          npm run build

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build
